<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YT Comment Lens</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    width: 300px;
    font-family: 'DM Sans', sans-serif;
    background: #0a0a0a;
    color: #fff;
    padding: 20px;
  }

  .logo-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 20px;
  }

  .logo {
    width: 32px;
    height: 32px;
    background: linear-gradient(135deg, #ff0054, #ff6b35);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
  }

  .logo-text h1 {
    font-size: 15px;
    font-weight: 700;
    line-height: 1;
  }

  .logo-text p {
    font-size: 10px;
    color: rgba(255,255,255,0.4);
    margin-top: 1px;
  }

  .section {
    margin-bottom: 16px;
  }

  label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    color: rgba(255,255,255,0.5);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 6px;
  }

  input[type="text"],
  input[type="password"],
  input[type="number"],
  select {
    width: 100%;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px;
    padding: 9px 12px;
    color: #fff;
    font-family: inherit;
    font-size: 13px;
    outline: none;
    transition: border-color 0.15s;
  }

  input:focus, select:focus {
    border-color: rgba(255,0,84,0.5);
  }

  input[type="password"] {
    font-family: monospace;
    letter-spacing: 0.1em;
  }

  .eye-wrap {
    position: relative;
  }

  .eye-wrap input { padding-right: 36px; }

  .eye-btn {
    position: absolute;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    color: rgba(255,255,255,0.4);
    cursor: pointer;
    font-size: 14px;
    padding: 0;
  }

  .save-btn {
    width: 100%;
    padding: 10px;
    background: linear-gradient(135deg, #ff0054, #ff6b35);
    border: none;
    border-radius: 8px;
    color: #fff;
    font-family: inherit;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: filter 0.15s, transform 0.1s;
    margin-top: 4px;
  }

  .save-btn:hover { filter: brightness(1.1); }
  .save-btn:active { transform: scale(0.98); }

  .status {
    font-size: 12px;
    text-align: center;
    margin-top: 10px;
    min-height: 18px;
    color: #34d399;
  }

  .status.error { color: #fb7185; }

  .divider {
    border: none;
    border-top: 1px solid rgba(255,255,255,0.07);
    margin: 16px 0;
  }

  .tip {
    font-size: 11px;
    color: rgba(255,255,255,0.35);
    line-height: 1.5;
    text-align: center;
  }

  .tip a { color: #ff6b35; text-decoration: none; }
  .tip a:hover { text-decoration: underline; }
</style>
</head>
<body>
  <div class="logo-row">
    <div class="logo">🔍</div>
    <div class="logo-text">
      <h1>YT Comment Lens</h1>
      <p>Comment analytics for YouTube</p>
    </div>
  </div>

  <div class="section">
    <label>YouTube Data API v3 Key</label>
    <div class="eye-wrap">
      <input type="password" id="yt-key" placeholder="AIza…" autocomplete="off">
      <button class="eye-btn" id="yt-eye">👁</button>
    </div>
  </div>

  <div class="section">
    <label>Groq API Key</label>
    <div class="eye-wrap">
      <input type="password" id="anthropic-key" placeholder="sk-ant-…" autocomplete="off">
      <button class="eye-btn" id="ant-eye">👁</button>
    </div>
  </div>

  <div class="section">
    <label>Comments to fetch per video</label>
    <input type="number" id="max-comments" value="60" min="20" max="200" step="10">
  </div>

  <button class="save-btn" id="save-btn">Save Settings</button>
  <div class="status" id="status"></div>

  <hr class="divider">

  <p class="tip">
    Hover over a thumbnail for a quick preview.<br>
    Check videos &amp; click "Analyze Selected" to compare.<br><br>
    <a href="https://console.cloud.google.com/" target="_blank">Get YouTube API key →</a>
  </p>

  <script src="popup.js"></script>
</body>
</html>
